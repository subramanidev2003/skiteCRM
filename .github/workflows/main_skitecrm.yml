name: Build and deploy Node.js app to Azure Web App - skitecrm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Ubuntu is faster and more reliable for MERN builds
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using LTS version for stability

      # 1. Build the React Frontend
      - name: Build Frontend
        working-directory: ./client # Change this if your react folder has a different name
        run: |
          npm install
          npm run build

      # 2. Prepare the Backend
      - name: Install Backend Dependencies
        working-directory: ./server # Change this if your node folder has a different name
        run: npm install

      # 3. Bundle them together
      # This moves the React 'build' into the Server folder so Azure sees one app
      - name: Move Frontend to Backend
        run: |
          mkdir -p server/public
          cp -r client/build/* server/public/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./server # We only deploy the server folder now

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'skitecrm'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_764B1D774E0540259C57F3552EC34AAD }}
          package: .
